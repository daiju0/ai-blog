- name: Generate article
  run: |
    mkdir -p posts
    FILENAME="posts/$(date +'%Y-%m-%d').md"
    echo "# $(date +'%Y-%m-%d') のAIブログ記事" > $FILENAME
    echo "" >> $FILENAME

    RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
      -H "Content-Type: application/json" \
      -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
      -d '{
        "model": "gpt-4o-mini",
        "messages": [{"role": "user", "content": "今日のテクノロジーやAIに関するニュースを日本語でブログ風にまとめて"}],
        "max_tokens": 500
      }')

    echo "$RESPONSE" | jq -r '.choices[0].message.content' >> $FILENAME
