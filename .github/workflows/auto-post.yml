- name: Generate article
  run: |
    mkdir -p posts
    FILENAME="posts/$(date +'%Y-%m-%d').md"
    echo "# $(date +'%Y-%m-%d') のAIブログ記事" > $FILENAME
    echo "" >> $FILENAME

    RESPONSE=$(curl -s -w "\n%{http_code}" https://api.openai.com/v1/chat/completions \
      -H "Content-Type: application/json" \
      -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
      -d '{
        "model": "gpt-3.5-turbo",
        "messages": [{"role": "user", "content": "今日のニュースを日本語でブログ風にまとめて"}]
      }')

    BODY=$(echo "$RESPONSE" | head -n -1)
    STATUS=$(echo "$RESPONSE" | tail -n 1)

    echo "HTTP Status: $STATUS"  # ログ確認用

    if [ "$STATUS" = "200" ]; then
      echo "$BODY" | jq -r '.choices[0].message.content' >> $FILENAME
    else
      echo "⚠️ OpenAI APIリクエスト失敗 ($STATUS)" >> $FILENAME
      echo "$BODY" >> $FILENAME
    fi
